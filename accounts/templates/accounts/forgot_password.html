{% extends 'accounts/accounts_base.html' %}
{% load static %}

{% block main-content %}
<div>
<img class ="mt-10" src="{% static 'images/AHC-LOGO.png' %}"/>

<div class="h-screen xl:h-auto flex py-5 xl:py-0 my-10 xl:my-0">
  
  <div class="mt-20 my-auto mx-auto xl:ml-20 bg-white dark:bg-darkmode-600 xl:bg-transparent px-5 sm:px-8 py-8 xl:p-0 rounded-md shadow-md xl:shadow-none w-full sm:w-3/4 lg:w-2/4 xl:w-auto">
      <h2 class="intro-x font-bold text-2xl xl:text-3xl text-center xl:text-left">
        Forgot Password?
      </h2>
      <div id='password_expired_message'></div>
      <h6 class="font-weight-light mt-5">Please input your email address to reset your password.</h6>
      <form 
        hx-post="{% url 'accounts:forgot_password' %}"
        hx-trigger="submit"
        hx-target="#password_expired_message"                  
        hx-on::before-request="pass_details.disabled = true;pass_details.innerHTML ='Sending Password Reset Link....'; return true;"
        hx-on::after-request="pass_details.disabled = false;pass_details.innerHTML ='Completed!'; return true;">  

          {% csrf_token %}
        <div class="intro-x mt-8">
            <input name="username" type="email" class="intro-x login__input form-control py-3 px-4 block" placeholder="Email">
        </div>
        
        <div class="intro-x mt-5 xl:mt-8 text-center xl:text-left w-full">
            <button id='pass_details' type='submit' class="btn btn-primary py-3 px-4 w-full xl:w-40 xl:mr-3 align-top">Reset Password</button>
        </div>
    </form>
    <div class="intro-x mt-10 xl:mt-24 text-slate-600 dark:text-slate-500 text-center xl:text-left"><a class="text-primary dark:text-slate-200" href="{% url 'accounts:login_user' %}">Remember your password? Login here</a></div>
  </div>
</div>
</div>
{% endblock %}
