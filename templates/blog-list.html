{% extends 'base.html' %}

{% block main-content %}
{% include 'messages.html' %}
          <div class="card-columns">
            {% for article in articles %}
            <div class="card">
              {% if article.cover_image %}
                <img class="card-img-top" src="{{article.cover_image.url}}">
              {% endif %}
              <div class="card-body">
                <h4 class="card-title mt-3">{{article.title}}</h4>
                <p class="card-text">{{article.short_description}}</p>
              </div>
            </div>
            {% empty %}
              <div class="card">
                <div class="card-body">
                  <h4 class="card-title mt-3">No Blog Articles added yet</h4>
                </div>
              </div>
            {% endfor %}

          </div>


{% endblock %}
