<!DOCTYPE html>
{% load static %}
{% load icon %}
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, shrink-to-fit=no">
    <title>UJCareerWiz User Manual </title>
    <link rel="icon" type="image/x-icon" href="{% static 'images/favicon.ico' %}"/>
    <!-- BEGIN GLOBAL MANDATORY STYLES -->
    <link href="https://fonts.googleapis.com/css?family=Nunito:400,600,700" rel="stylesheet">
    <link href="{% static 'spaces/documentation/js/styles/monokai-sublime.css' %}" rel="stylesheet" type="text/css" />    
    <link href="{% static 'spaces/bootstrap/css/bootstrap.min.css' %}" rel="stylesheet" type="text/css" />
    <!-- <link href="../demo1/assets/css/plugins.css" rel="stylesheet" type="text/css" /> -->

    <link href="{% static 'spaces/documentation/css/perfect-scrollbar.css' %}" rel="stylesheet" type="text/css" />
    <link href="{% static 'spaces/documentation/css/structure.css' %}" rel="stylesheet" type="text/css" />
    <!-- END GLOBAL MANDATORY STYLES -->
    
    <!-- BEGIN PAGE LEVEL PLUGINS/CUSTOM STYLES -->
    <link rel="stylesheet" type="text/css" href="{% static 'spaces/documentation/css/style.css' %}">
    <link rel="stylesheet" type="text/css" href="{% static 'spaces/documentation/css/whats-new.css' %}">
    <!-- END PAGE LEVEL PLUGINS/CUSTOM STYLES -->

    <style>
        h6.question {
            font-size: 18px;
            font-weight: 700;
            letter-spacing: 1px;
            color: #805dca;
        }
        p.answers {
            color: #888ea8;
        }
    </style>
    
</head>
<body class="default-sidebar">

    <div class="header-container fixed-top">
        <header class="header navbar navbar-expand-sm">

            <ul class="navbar-nav theme-brand flex-row  text-center">
                <li class="hamburger">
                    <a href="javascript:void(0);" class="sidebarCollapse d-lg-none" data-placement="bottom"><svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="feather feather-menu"><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg></a>
                </li>
                
            </ul>

            <ul class="navbar-nav flex-row mx-sm-auto header-title">
                <li>User Manual - Students </li>
            </ul>
            
        </header>
    </div>

    <!--  BEGIN MAIN CONTAINER  -->
    <div class="main-container" id="container">

        <div class="overlay"></div>
        <div class="cs-overlay"></div>
        <div class="search-overlay"></div>

        <!--  BEGIN SIDEBAR  -->
        <div class="sidebar-wrapper sidebar-theme">
                        
            <nav id="sidebar">

                <ul class="list-unstyled menu-categories" id="accordionExample">

                        {% include 'student_manual_nav.html' %}
                        
                    
                </ul>

            </nav>

        </div>
        <!--  END SIDEBAR  -->
        
        <!--  BEGIN CONTENT AREA  -->
        <div id="content" class="main-content">
            <div class="container">
                
                {% block main-content %}

      
                {% endblock %}

            </div>
        </div>
        <!--  END CONTENT AREA  -->
    </div>
    <!-- END MAIN CONTAINER -->

    <!-- BEGIN GLOBAL MANDATORY SCRIPTS -->
    <script src="{% static 'spaces/documentation/js/perfect-scrollbar.min.js' %}"></script>
    <script src="{% static 'spaces/documentation/js/script.js' %}"></script>
    <!-- END GLOBAL MANDATORY SCRIPTS -->

    <!-- BEGIN PAGE LEVEL PLUGINS/CUSTOM SCRIPTS -->

    <!-- BEGIN PAGE LEVEL PLUGINS/CUSTOM SCRIPTS -->
