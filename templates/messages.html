{% for message in messages %}    
  {% if message.tags %}
    <div class="alert alert-{{ message.tags }} show flex items-center mb-2 mt-5 text-black" role="alert"> 
      <i data-lucide="alert-circle" class="w-6 h-6 mr-2"></i> 
      {{ message|safe }} 
    </div> 
    <br>
  {% else %}
    <div class="alert alert-danger show flex items-center mb-2 mt-5 text-black" role="alert"> 
      <i data-lucide="alert-circle" class="w-6 h-6 mr-2"></i> 
      {{ message|safe }} 
    </div> 
    {% endif %}
{% endfor %}
