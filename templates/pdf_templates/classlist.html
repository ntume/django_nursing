<html>
 <head>
   <title>Test</title>
   <style>
     h1 {
       text-align: center;
     }

     table {
       border: 1px solid;
       margin: 0 auto;
       width: 70%;
     }

     td, th {
       text-align: center;
       border: 1px solid;
     }
   </style>
 </head>
 <body>
   <h1>List of people</h1>
   <table>
     <thead>
       <tr>
         <th>Student Number</th>
         <th>Fullname</th>
         <th>Company</th>
       </tr>
     </thead>
     <tbody>
       {% for studsubj in class_list %}
         <tr>
           <td>{{ studsubj.student.student_number }}</td>
           <td>{{ studsubj.student.name }} {{studsubj.student.surname}}</td>
           <td>{{ studsubj.company.name }}</td>
         </tr>
       {% endfor %}
     </tbody>
   </table>
 </body>
</html>
