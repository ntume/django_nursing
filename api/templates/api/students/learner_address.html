<form action="{% url 'api:edit_learner_address_details' lp.id %}" method='POST'> 
    {% csrf_token %}    
    <div class="font-medium text-base">Address & Communication Details</div>
    <div class="grid grid-cols-12 gap-4 gap-y-5 mt-5">
        <div class="intro-y col-span-12 sm:col-span-6">
            <label for="id_physical_address_1" class="form-label">Physical Address Line 1*</label>
            <input type="text" class="form-control" name="physical_address_1" id="id_physical_address_1" placeholder="Physical Address Line 1" value="{{ lp.student.physical_address_1|default_if_none:'' }}" required {{ lp_edit }}>
        </div>
        <div class="intro-y col-span-12 sm:col-span-6">
            <label for="id_postal_address_2" class="form-label w-full">Postal Address Line 1*</label>
            <input name='postal_address_1' id="id_postal_address_1" type="text" class="form-control" placeholder="Postal Address 2" value='{{ lp.student.postal_address_1|default_if_none:""  }}' required {{ lp_edit }}>
        </div> 
        
        <div class="intro-y col-span-12 sm:col-span-6">
            <label for="id_physical_address_2" class="form-label">Physical Address Line 2*</label>
            <input type="text" class="form-control" name="physical_address_2" id="id_physical_address_2" placeholder="Physical Address Line 2" value="{{ lp.student.physical_address_2|default_if_none:'' }}" required {{ lp_edit }}>
        </div>
        <div class="intro-y col-span-12 sm:col-span-6">
            <label for="id_postal_address_2" class="form-label w-full">Postal Address Line 2*</label>
            <input name='postal_address_2' id="id_postal_address_2" type="text" class="form-control" placeholder="Postal Address 2" value='{{ lp.student.postal_address_2|default_if_none:""  }}' required {{ lp_edit }}>
        </div> 
        
        <div class="intro-y col-span-12 sm:col-span-6">
            <label for="id_physical_address_3" class="form-label">Physical Address Line 3</label>
            <input type="text" class="form-control" name="physical_address_3" id="id_physical_address_3" placeholder="Physical Address Line 3" value="{{ lp.student.physical_address_3|default_if_none:'' }}" {{ lp_edit }}>
        </div>
        <div class="intro-y col-span-12 sm:col-span-6">
            <label for="id_postal_address_2" class="form-label w-full">Postal Address Line 3</label>
            <input name='postal_address_3' id="id_postal_address_3" type="text" class="form-control" placeholder="Postal Address 2" value='{{ lp.student.postal_address_3|default_if_none:""  }}' {{ lp_edit }}>
        </div> 

        <div class="intro-y col-span-12 sm:col-span-6">
            <label for="id_area" class="form-label w-90">Pysical Address Postal Code*<br><i class='text-danger'>Start typing the suburb name and choose from the list</i></label>
            <select name='area' class='tom-select' required>
                <option></option>
                {% for area in areas %}
                    {% if lp.student.area == area %}
                        <option value='{{ area.id }}' selected>{{area.postal_code}} * {{area.suburb}}</option>
                    {% else %}
                        <option value='{{ area.id }}'>{{area.postal_code}} * {{area.suburb}}</option>
                    {% endif %}
                    
                {% endfor %}
            </select>
        </div>

        <div class="intro-y col-span-12 sm:col-span-6">
            <label for="id_area_postal" class="form-label w-90">Postal Address Postal Code*<br><i class='text-danger'>Start typing the suburb name and choose from the list</i></label>
            <select name='postal_address_postal_code' class='tom-select' required>
                <option></option>
                {% for area in areas %}
                    {% if lp.student.postal_address_postal_code == area %}
                        <option value='{{ area.id }}' selected>{{area.postal_code}} * {{area.suburb}}</option>
                    {% else %}
                        <option value='{{ area.id }}'>{{area.postal_code}} * {{area.suburb}}</option>
                    {% endif %}                        
                {% endfor %}
            </select>
        </div>
        
        <div class="intro-y col-span-12 sm:col-span-6">
            <div class="form-check mt-10"> <input id="copy_address" class="form-check-input" type="checkbox" value=""> <label class="form-check-label text-primary" for="checkbox-switch-1">Same for Postal Address</label> </div>
        </div>
        <div class="intro-y col-span-12 sm:col-span-6">
        </div> 
        

        

        <div class="intro-y col-span-12 sm:col-span-6">
            <label for="id_trading_name" class="form-label w-48">Type of Area*</label>
            <select name="type_of_area" id="id_type_of_area" class="form-select" required  {{ lp_edit }}>
                <option></option>
                {% if lp.student.type_of_area == "Rural" %}
                    <option value="Rural" selected>Rural</option>
                    <option value="Urban">Urban</option>
                {% else %}
                    <option value="Rural">Rural</option>
                    <option value="Urban" selected>Urban</option>
                {% endif %}
            </select>
        </div>

        
        <div class="intro-y col-span-12 sm:col-span-6">
            <label for="id_email" class="form-label w-96">Email Address*</label>
            <input maxlength='30' type="text" class="form-control" name="email" id="id_email" placeholder="Email Address" value="{{ lp.student.email|default_if_none:'' }}" required {{ lp_edit }}>
        </div>
        <div class="intro-y col-span-12 sm:col-span-6">
            <label for="id_phone_number" class="form-label w-96">Telephone Number</label>
            <input type="text" class="form-control" name="phone_number" id="id_phone_number" placeholder="Phone Number"  value="{{ lp.student.phone_number|default_if_none:'' }}" maxlength="10"  {{ lp_edit }}>
        </div>
        <div class="intro-y col-span-12 sm:col-span-6">
            <label for="id_cellphone" class="form-label w-96">Cellphone Number*</label>
            <input type="text" class="form-control" name="cellphone" id="id_cellphone" placeholder="Cellphone Number"  value="{{ lp.student.cellphone|default_if_none:'' }}" maxlength="10" required {{ lp_edit }}>
        </div>
        <div class="intro-y col-span-12 sm:col-span-6">
            <label for="id_fax" class="form-label w-96">Fax Number</label>
            <input type="text" class="form-control" name="fax" id="id_fax" placeholder="Fax Number" value="{{ lp.student.fax|default_if_none:'' }}" maxlength="10" {{ lp_edit }}>
        </div>         
        

        <div class="intro-y col-span-12 flex items-center justify-center sm:justify-end mt-5">
            <a href="{% url 'api:open_onboarding' lp.id lp.student.slug previous_page %}" class="btn btn-secondary w-24">Previous</a>
            <button type='submit' class="btn btn-primary w-24 ml-2">Next</button>
        </div>
    </div>
</form>
